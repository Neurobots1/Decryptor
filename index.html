/* ============================================================================
   16. ROOT APP
   ========================================================================== */
function App() {
    const [tab, setTab] = useState("match");
    const [pitReturnTab, setPitReturnTab] = useState("");
    const [dataTab, setDataTab] = useState("matches");
    const [showHelp, setShowHelp] = useState(false);
    const [showCredits, setShowCredits] = useState(false);
    const { unlocked, unlock, lock } = useAdvancedAuth();
    const [matches, setMatches] = useState(() => LS.get("matches", []) || []);
    const [pits, setPits] = useState(() => {
        const saved = LS.get("pits", []) || [];
        // rehydrate photos
        return saved.map((p) => (Object.assign(Object.assign({}, p), { photo: loadPhoto(p.timestamp) || p.photo || null })));
    });
    const [queue, setQueue] = useState(() => LS.get("queue", []) || []);
    const [webhook, setWebhookState] = useState(() => LS.get("webhook", "") || "");
    const [scouterNames, setScouterNames] = useState(() => LS.get("scouter_names", []) || []);
    const [partyCode, setPartyCode] = useState(() => LS.get("partyCode", null));
    const [online, setOnline] = useState(() => typeof navigator !== "undefined" ? navigator.onLine : true);
    const [toastMsg, setToastMsg] = useState(null);
    const [quotaWarned, setQuotaWarned] = useState(false);
    const editMatchHandler = useRef(null);
    const editPitHandler = useRef(null);
    useEffect(() => {
        const resize = (el) => {
            if (!(el instanceof HTMLTextAreaElement) || el.readOnly)
                return;
            el.style.height = "auto";
            el.style.height = `${el.scrollHeight}px`;
        };
        const resizeAll = () => document.querySelectorAll("textarea").forEach((el) => resize(el));
        resizeAll();
        const onInput = (e) => resize(e.target);
        document.addEventListener("input", onInput, true);
        const observer = new MutationObserver(() => resizeAll());
        observer.observe(document.body, { childList: true, subtree: true });
        return () => {
            document.removeEventListener("input", onInput, true);
            observer.disconnect();
        };
    });
    // Persist
    useEffect(() => {
        const ok = LS.set("matches", matches.map((m) => (Object.assign(Object.assign({}, m), { photo: undefined }))));
        if (!ok && !quotaWarned) {
            alert("Device storage is full — newer data may not save.");
            setQuotaWarned(true);
        }
